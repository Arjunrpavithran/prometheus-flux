apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
spec:
  selector:
    matchLabels:
      app: node-exporter

  template:
    metadata:
      labels:
        app: node-exporter

    spec:
      containers:
      - name: node-exporter
        image: quay.io/prometheus/node-exporter:latest
        args:
        - "--path.rootfs=/host"
        ports:
        - containerPort: 9100
          name: metrics

#        volumeMounts:
#        - name: config-volume
#          mountPath: /etc/prometheus/
#          readOnly: true

