apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:

    - job_name: prometheus
      static_configs:
      - targets: ['localhost:9090']

    - job_name: node-exporter
      static_configs:
      - targets: ['node-exporter:9100']
      basic_auth:
        username_file: /etc/prometheus/node-exporter/username
        password_file: /etc/prometheus/node-exporter/password

    - job_name: sample-app
      static_configs:
      - targets: ['sample-app:8080']
